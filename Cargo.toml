[package]
name = "edge_ai"
version = "0.1.0"
edition = "2024"

[dependencies]
half = "2.7"
image = "0.25"
outlines-core = {version = "0.2", default-features = false}
#sentencepiece = "0.13"
thiserror = "2"
tokenizers = "0.23"
usearch = "2"
executorch = { git = "https://github.com/jbrummack/executorch-rs.git", rev = "8a0715be26567c6e7d849f27ffbf26c73b3936af",  features = ["ndarray","xnnpack","quantised_kernels","module","download_prebuilt", "optimised_kernels","coreml"]}
[features]
default = ["half"]
half = ["executorch/half"]
